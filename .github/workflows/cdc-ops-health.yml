name: cdc-ops-health

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      source_cluster_id:
        description: Source SQL Server cluster id
        required: false
        default: prod-sqlserver-a
      project_id:
        description: Migration project id
        required: false
        default: sales-db-to-tidb-prod-a
      max_checkpoint_age:
        description: Maximum allowed CDC checkpoint age
        required: false
        default: 15m
      fail_on_warning:
        description: Fail when health status is warning
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  cdc-health:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CDC_SOURCE_CLUSTER_ID: ${{ github.event.inputs.source_cluster_id || vars.SQLSERVER2TIDB_CDC_SOURCE_CLUSTER_ID || 'prod-sqlserver-a' }}
      CDC_PROJECT_ID: ${{ github.event.inputs.project_id || vars.SQLSERVER2TIDB_CDC_PROJECT_ID || 'sales-db-to-tidb-prod-a' }}
      CDC_MAX_CHECKPOINT_AGE: ${{ github.event.inputs.max_checkpoint_age || vars.SQLSERVER2TIDB_CDC_MAX_CHECKPOINT_AGE || '15m' }}
      CDC_FAIL_ON_WARNING: ${{ github.event.inputs.fail_on_warning || vars.SQLSERVER2TIDB_CDC_FAIL_ON_WARNING || 'false' }}
      CDC_FEISHU_ALERT_MIN_SEVERITY: ${{ vars.SQLSERVER2TIDB_CDC_FEISHU_ALERT_MIN_SEVERITY || 'critical' }}
      CDC_HEALTH_HISTORY_FILE: ${{ vars.SQLSERVER2TIDB_CDC_HEALTH_HISTORY_FILE }}
      SQLSERVER2TIDB_SOURCE_CONNECTION_STRING: ${{ secrets.SQLSERVER2TIDB_INTEGRATION_SOURCE_DSN }}
      SQLSERVER2TIDB_FEISHU_WEBHOOK: ${{ secrets.SQLSERVER2TIDB_FEISHU_WEBHOOK }}
      SQLSERVER2TIDB_FEISHU_SECRET: ${{ secrets.SQLSERVER2TIDB_FEISHU_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.SQLSERVER2TIDB_GITHUB_APP_TOKEN || github.token }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: true

      - name: Skip when source DSN is not configured
        run: |
          if [ -z "${SQLSERVER2TIDB_SOURCE_CONNECTION_STRING}" ]; then
            echo "::notice::SQLSERVER2TIDB_INTEGRATION_SOURCE_DSN is not set; skipping CDC health probe"
            exit 0
          fi

      - name: Build CLI
        if: env.SQLSERVER2TIDB_SOURCE_CONNECTION_STRING != ''
        run: make build

      - name: Run CDC health probe
        if: env.SQLSERVER2TIDB_SOURCE_CONNECTION_STRING != ''
        run: |
          history_file="${CDC_HEALTH_HISTORY_FILE}"
          if [ -z "${history_file}" ]; then
            history_file="clusters/${CDC_SOURCE_CLUSTER_ID}/projects/${CDC_PROJECT_ID}/state/cdc-health-history.jsonl"
          fi
          args=(
            bin/sqlserver2tidb
            cdc-health
            --root .
            --source-cluster-id "${CDC_SOURCE_CLUSTER_ID}"
            --project-id "${CDC_PROJECT_ID}"
            --probe-lsn
            --max-checkpoint-age "${CDC_MAX_CHECKPOINT_AGE}"
            --json
            --metrics-file artifacts/cdc-health.json
            --history-file "${history_file}"
            --feishu-alert-min-severity "${CDC_FEISHU_ALERT_MIN_SEVERITY}"
          )
          if [ "${CDC_FAIL_ON_WARNING}" = "true" ]; then
            args+=(--fail-on-warning)
          fi
          set +e
          "${args[@]}"
          code=$?
          set -e
          echo "CDC_HEALTH_EXIT_CODE=${code}" >> "${GITHUB_ENV}"

      - name: Commit CDC health history
        if: always() && env.SQLSERVER2TIDB_SOURCE_CONNECTION_STRING != ''
        run: |
          if git diff --quiet -- clusters; then
            echo "::notice::No CDC health history changes to commit"
            exit 0
          fi
          git config user.name "sqlserver2tidb[bot]"
          git config user.email "sqlserver2tidb[bot]@users.noreply.github.com"
          git add clusters
          git commit -m "Record CDC health check"
          git push

      - name: Upload CDC health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cdc-health-report
          path: artifacts/cdc-health.json
          if-no-files-found: ignore

      - name: Preserve CDC health status
        if: always() && env.SQLSERVER2TIDB_SOURCE_CONNECTION_STRING != ''
        run: exit "${CDC_HEALTH_EXIT_CODE:-0}"
