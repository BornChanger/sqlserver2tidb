name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: true

      - name: Run local CI
        run: make ci

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          commit="${GITHUB_SHA}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          buildinfo_pkg="github.com/BornChanger/sqlserver2tidb/internal/buildinfo"
          ldflags="-X ${buildinfo_pkg}.Version=${version} -X ${buildinfo_pkg}.Commit=${commit} -X ${buildinfo_pkg}.BuildDate=${build_date}"

          mkdir -p dist
          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            suffix=""
            if [ "${goos}" = "windows" ]; then
              suffix=".exe"
            fi

            name="sqlserver2tidb_${version}_${goos}_${goarch}"
            outdir="dist/${name}"
            mkdir -p "${outdir}"

            GOOS="${goos}" GOARCH="${goarch}" go build -ldflags "${ldflags}" -o "${outdir}/sqlserver2tidb${suffix}" ./cmd/sqlserver2tidb
            GOOS="${goos}" GOARCH="${goarch}" go build -ldflags "${ldflags}" -o "${outdir}/sqlserver2tidb-executor${suffix}" ./cmd/sqlserver2tidb-executor

            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "${outdir}"
          done

          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --title "${GITHUB_REF_NAME}" --generate-notes
